<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aknan ERP — app.aknans.sa</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}html,body,#root{height:100%}
body{font-family:'Inter',sans-serif;background:#F0F2F5;color:#1A1A2E}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C0C4CC;border-radius:3px}
input,select,textarea,button{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;height:100vh;align-items:center;justify-content:center;font-size:14px;color:#64748B">Loading…</div></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

/* ─── THEME ──────────────────────────────────── */
const N='#0E2A3D',ST='#1C5D86',AM='#E2722A',LG='#F1F5F9',BD='#E2E8F0',DK='#0F172A',MD='#64748B',GR='#16A34A',RD='#DC2626',YL='#D97706';

/* ─── API ────────────────────────────────────── */
const api={
  call:async(method,path,body=null)=>{
    const opts={method,headers:{'Content-Type':'application/json'},credentials:'include'};
    if(body)opts.body=JSON.stringify(body);
    const r=await fetch('/api'+path,opts);
    const d=await r.json().catch(()=>({}));
    if(!r.ok)throw new Error(d.error||'Request failed');
    return d;
  },
  get:p=>api.call('GET',p),
  post:(p,b)=>api.call('POST',p,b),
  put:(p,b)=>api.call('PUT',p,b),
  del:p=>api.call('DELETE',p),
};

/* ─── DATA HOOK ──────────────────────────────── */
function useApi(ep,key){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const load=useCallback(()=>{
    setLoading(true);
    api.get(ep).then(r=>setData(r[key]||[])).catch(()=>setData([])).finally(()=>setLoading(false));
  },[ep,key]);
  useEffect(()=>{load();},[load]);
  return [data,loading,load,setData];
}

/* ─── SHARED COMPONENTS ──────────────────────── */
const Av=({ini,color=N,bg='#E8EEF7',size=34})=>(
  <div style={{width:size,height:size,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:size*.3,color,flexShrink:0}}>{ini||'?'}</div>
);
const Chip=({c=ST,bg='#E3F0F9',children})=>(
  <span style={{background:bg,color:c,fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20,whiteSpace:'nowrap'}}>{children}</span>
);
const Spinner=()=>(
  <div style={{display:'flex',justifyContent:'center',padding:48}}>
    <div style={{width:28,height:28,border:'3px solid '+BD,borderTopColor:ST,borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
  </div>
);
const Empty=({icon='📋',msg})=>(
  <div style={{textAlign:'center',padding:'48px 0',color:MD}}>
    <div style={{fontSize:36,marginBottom:10}}>{icon}</div>
    <div style={{fontSize:13}}>{msg}</div>
  </div>
);
const Toast=({msg,type,onClose})=>{
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[]);
  const err=type==='error';
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,
      background:err?'#FEE2E2':'#DCFCE7',border:'1.5px solid '+(err?RD:GR),
      borderRadius:10,padding:'12px 18px',fontSize:13,fontWeight:500,color:err?'#B91C1C':'#15803D',
      boxShadow:'0 4px 16px rgba(0,0,0,.12)',minWidth:240}}>
      {err?'✕ ':'✓ '}{msg}
    </div>
  );
};
const sStyle=s=>{
  const m={Active:{c:GR,bg:'#DCFCE7'},Inactive:{c:'#9CA3AF',bg:'#F3F4F6'},
    Received:{c:GR,bg:'#DCFCE7'},Posted:{c:GR,bg:'#DCFCE7'},Approved:{c:GR,bg:'#DCFCE7'},
    Delivered:{c:GR,bg:'#DCFCE7'},Confirmed:{c:'#1D4ED8',bg:'#DBEAFE'},Invoiced:{c:'#6D28D9',bg:'#EDE9FE'},
    Dispatched:{c:'#0369A1',bg:'#E0F2FE'},Submitted:{c:'#0369A1',bg:'#E0F2FE'},Locked:{c:'#374151',bg:'#F3F4F6'},
    Partial:{c:YL,bg:'#FEF9C3'},Pending:{c:YL,bg:'#FEF9C3'},Draft:{c:'#9CA3AF',bg:'#F3F4F6'},
    Cancelled:{c:RD,bg:'#FEE2E2'},'On Hold':{c:RD,bg:'#FEE2E2'},Terminated:{c:RD,bg:'#FEE2E2'}};
  const d=m[s]||{c:MD,bg:LG};
  return{background:d.bg,color:d.c,fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:20,whiteSpace:'nowrap'};
};
const payChip=m=>{
  if(!m||m==='-')return null;
  const cash=m==='Cash';
  return <span style={{background:cash?'#FEF3C7':'#DBEAFE',color:cash?'#92400E':'#1E40AF',fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:20}}>{cash?'Cash':'Bank'}</span>;
};
const sar=n=>'SAR '+(Number(n)||0).toLocaleString();
const TH=({ch})=><th style={{padding:'9px 14px',textAlign:'left',fontSize:11,fontWeight:700,color:MD,textTransform:'uppercase',letterSpacing:.5,borderBottom:'1px solid '+BD,background:LG,whiteSpace:'nowrap'}}>{ch}</th>;
const TD=({children,center})=><td style={{padding:'11px 14px',fontSize:13,color:DK,borderBottom:'1px solid '+BD,verticalAlign:'middle',textAlign:center?'center':'left'}}>{children}</td>;

/* Modal */
const Modal=({title,onClose,onSave,saveLabel='Save',wide,children})=>(
  <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:'white',borderRadius:14,width:wide?700:480,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 20px 50px rgba(0,0,0,.2)'}}>
      <div style={{padding:'18px 22px',borderBottom:'1px solid '+BD,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <div style={{fontSize:15,fontWeight:700,color:DK}}>{title}</div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:MD,lineHeight:1}}>✕</button>
      </div>
      <div style={{padding:'18px 22px',overflowY:'auto',flex:1}}>{children}</div>
      <div style={{padding:'14px 22px',borderTop:'1px solid '+BD,display:'flex',gap:10,justifyContent:'flex-end',flexShrink:0}}>
        <button onClick={onClose} style={{background:'none',border:'1px solid '+BD,borderRadius:7,padding:'9px 18px',fontSize:13,cursor:'pointer'}}>Cancel</button>
        <button onClick={onSave} style={{background:N,border:'none',borderRadius:7,padding:'9px 20px',fontSize:13,fontWeight:600,cursor:'pointer',color:'white'}}>{saveLabel}</button>
      </div>
    </div>
  </div>
);
const FG=({children})=><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>{children}</div>;
const FI=({label,half,children})=><div style={{marginBottom:14,gridColumn:half?'span 1':'span 2'}}><label style={{fontSize:12,fontWeight:600,color:MD,display:'block',marginBottom:5}}>{label}</label>{children}</div>;
const Inp=({value,onChange,type='text',placeholder=''})=>(
  <input value={value||''} onChange={e=>onChange(e.target.value)} type={type} placeholder={placeholder}
    style={{width:'100%',border:'1.5px solid '+BD,borderRadius:7,padding:'9px 12px',fontSize:13,outline:'none',color:DK}}/>
);
const Sel=({value,onChange,children})=>(
  <select value={value||''} onChange={e=>onChange(e.target.value)}
    style={{width:'100%',border:'1.5px solid '+BD,borderRadius:7,padding:'9px 12px',fontSize:13,outline:'none',color:DK,background:'white'}}>
    {children}
  </select>
);
const StatsBar=({items})=>(
  <div style={{display:'grid',gridTemplateColumns:'repeat('+items.length+',1fr)',gap:12,flexShrink:0}}>
    {items.map((s,i)=>(
      <div key={i} style={{background:'white',border:'1px solid '+BD,borderRadius:10,padding:'14px 16px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:38,height:38,borderRadius:9,background:s.bg||'#E8EEF7',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>{s.icon}</div>
        <div><div style={{fontSize:19,fontWeight:700,color:s.color||N}}>{s.value}</div><div style={{fontSize:11,color:MD,marginTop:1}}>{s.label}</div></div>
      </div>
    ))}
  </div>
);

/* ─── LOGIN ──────────────────────────────────── */
const Login=({onLogin})=>{
  const [email,setEmail]=useState('admin@aknan.com');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!email||!pass){setErr('Email and password are required');return;}
    setLoading(true);setErr('');
    try{const d=await api.post('/auth/login',{email,password:pass});onLogin(d.user);}
    catch(e){setErr(e.message||'Invalid email or password');setLoading(false);}
  };
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,'+N+','+ST+')',display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:16,padding:'40px 44px',width:420,boxShadow:'0 20px 60px rgba(0,0,0,.25)'}}>
        <div style={{textAlign:'center',marginBottom:30}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,marginBottom:14}}>
            <svg width="40" height="40" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="21" stroke={AM} strokeWidth="3"/><circle cx="24" cy="24" r="13" stroke={N} strokeWidth="3"/><circle cx="24" cy="24" r="5" fill={AM}/></svg>
            <div><div style={{fontWeight:700,fontSize:20,color:N}}>AKNAN ERP</div><div style={{fontSize:10,color:MD,letterSpacing:1.4,textTransform:'uppercase'}}>app.aknans.sa</div></div>
          </div>
          <div style={{fontSize:21,fontWeight:600,color:DK}}>Sign in to your account</div>
        </div>
        {err&&<div style={{background:'#FEE2E2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#B91C1C',marginBottom:14}}>{err}</div>}
        {[{l:'Email',v:email,s:setEmail,t:'email'},{l:'Password',v:pass,s:setPass,t:'password'}].map(f=>(
          <div key={f.l} style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:MD,textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:5}}>{f.l}</label>
            <input value={f.v} onChange={e=>f.s(e.target.value)} type={f.t}
              onKeyDown={e=>e.key==='Enter'&&submit()}
              style={{width:'100%',border:'1.5px solid '+BD,borderRadius:8,padding:'11px 14px',fontSize:14,outline:'none',color:DK}}/>
          </div>
        ))}
        <button onClick={submit} disabled={loading} style={{width:'100%',background:loading?ST:N,color:'white',border:'none',borderRadius:8,padding:12,fontSize:15,fontWeight:600,cursor:'pointer',marginTop:6}}>
          {loading?'Signing in…':'Sign In'}
        </button>
        <div style={{textAlign:'center',marginTop:16,fontSize:12,color:MD,background:LG,borderRadius:8,padding:'8px 12px'}}>Default admin: <b>admin@aknan.com</b></div>
      </div>
    </div>
  );
};

/* ─── DASHBOARD ──────────────────────────────── */
const Dashboard=({setPage,user})=>{
  const [stats,setStats]=useState({});
  const [activity,setActivity]=useState([]);
  useEffect(()=>{api.get('/dashboard').then(d=>{setStats(d.stats||{});setActivity(d.recent_activity||[]);}).catch(()=>{});},[]);
  const mods=[['📦','Purchase','purchase'],['💳','Expenses','expense'],['📊','Sales','sales'],['📒','Accounts','accounts'],['👥','HR','hr'],['🚛','Delivery','delivery'],['🏪','Distributor','distributor'],['🏭','Production','production']];
  return(
    <div style={{padding:24,overflowY:'auto',height:'100%'}}>
      <div style={{marginBottom:20}}><div style={{fontSize:21,fontWeight:700,color:DK}}>Good morning, {user?.name?.split(' ')[0]||'Administrator'} 👋</div><div style={{fontSize:13,color:MD,marginTop:3}}>Aknan Specialized for Industry — ERP</div></div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[{icon:'🤝',label:'Customers',value:stats.customers??0,color:ST,bg:'#E3F0F9'},{icon:'📦',label:'Vendors',value:stats.vendors??0,color:YL,bg:'#FEF9C3'},{icon:'👥',label:'Employees',value:stats.employees??0,color:GR,bg:'#DCFCE7'},{icon:'🏪',label:'Distributors',value:stats.distributors??0,color:N,bg:'#E8EEF7'}].map((c,i)=>(
          <div key={i} style={{background:'white',border:'1px solid '+BD,borderRadius:12,padding:18,display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:44,height:44,borderRadius:10,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{c.icon}</div>
            <div><div style={{fontSize:22,fontWeight:700,color:c.color}}>{c.value}</div><div style={{fontSize:12,color:MD,marginTop:2}}>{c.label}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1.3fr 0.7fr',gap:16,marginBottom:16}}>
        <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,padding:18}}>
          <div style={{fontSize:14,fontWeight:600,color:DK,marginBottom:12}}>Modules</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
            {mods.map(([icon,name,id])=>(
              <button key={id} onClick={()=>setPage(id)} style={{background:LG,border:'1px solid '+BD,borderRadius:8,padding:'10px 12px',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:9}}>
                <span style={{fontSize:18}}>{icon}</span><div style={{fontSize:12,fontWeight:600,color:DK}}>{name}</div>
              </button>
            ))}
          </div>
        </div>
        <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,padding:18}}>
          <div style={{fontSize:14,fontWeight:600,color:DK,marginBottom:12}}>Recent Activity</div>
          {activity.length===0&&<Empty icon="📋" msg="No activity yet"/>}
          {activity.slice(0,7).map((a,i)=>(
            <div key={i} style={{padding:'8px 0',borderBottom:i<Math.min(6,activity.length-1)?'1px solid '+BD:'none',display:'flex',gap:8}}>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:DK}}>{a.user_name||'System'}</div><div style={{fontSize:11,color:MD}}>{a.action}{a.module?' — '+a.module:''}</div></div>
              <div style={{fontSize:10,color:'#94A3B8',flexShrink:0}}>{(a.created_at||'').slice(11,16)}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'linear-gradient(135deg,'+N+','+ST+')',borderRadius:12,padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div><div style={{fontSize:14,fontWeight:700,color:'white',marginBottom:3}}>Admin Quick Access</div><div style={{fontSize:12,color:'rgba(255,255,255,.7)'}}>Manage users and module permissions</div></div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={()=>setPage('users')} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.3)',borderRadius:8,padding:'7px 14px',color:'white',fontSize:12,fontWeight:600,cursor:'pointer'}}>👤 Users</button>
          <button onClick={()=>setPage('permissions')} style={{background:AM,border:'none',borderRadius:8,padding:'7px 14px',color:'white',fontSize:12,fontWeight:600,cursor:'pointer'}}>🔐 Permissions</button>
        </div>
      </div>
    </div>
  );
};

/* ─── PURCHASE ───────────────────────────────── */
const PurchasePage=({toast})=>{
  const [tab,setTab]=useState('orders');
  const [orders,oLoad,reloadO]=useApi('/purchase/orders','purchase_orders');
  const [vendors,vLoad,reloadV]=useApi('/vendors','vendors');
  const [banks]=useApi('/bank-accounts','bank_accounts');
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [search,setSearch]=useState('');
  const fO=orders.filter(o=>!search||o.po_number?.toLowerCase().includes(search.toLowerCase())||o.vendor_name?.toLowerCase().includes(search.toLowerCase()));
  const fV=vendors.filter(v=>!search||v.name?.toLowerCase().includes(search.toLowerCase()));
  const saveOrder=async()=>{
    try{await api.post('/purchase/orders',form);toast('Purchase Order created');setModal(null);reloadO();}catch(e){toast(e.message,'error');}
  };
  const saveVendor=async()=>{
    try{await api.post('/vendors',form);toast('Vendor added');setModal(null);reloadV();}catch(e){toast(e.message,'error');}
  };
  return(
    <div style={{padding:22,overflowY:'auto',height:'100%',display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',gap:0,borderBottom:'2px solid '+BD,flexShrink:0}}>
        {[['orders','Purchase Orders'],['vendors','Vendors']].map(([id,lbl])=>(
          <button key={id} onClick={()=>{setTab(id);setSearch('');}} style={{background:'none',border:'none',padding:'8px 18px',fontSize:13,fontWeight:tab===id?700:500,color:tab===id?N:MD,borderBottom:tab===id?'2px solid '+N:'2px solid transparent',cursor:'pointer',marginBottom:-2}}>{lbl}</button>
        ))}
      </div>
      {tab==='orders'?(<>
        <StatsBar items={[{icon:'📋',label:'Total Orders',value:orders.length,color:N,bg:'#E8EEF7'},{icon:'✅',label:'Received',value:orders.filter(o=>o.status==='Received').length,color:GR,bg:'#DCFCE7'},{icon:'⏳',label:'Pending',value:orders.filter(o=>o.status==='Pending').length,color:YL,bg:'#FEF9C3'},{icon:'💰',label:'Total Value',value:sar(orders.reduce((s,o)=>s+Number(o.total_amount||0),0)),color:ST,bg:'#E3F0F9'}]}/>
        <div style={{display:'flex',gap:10,flexShrink:0}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search orders…" style={{flex:1,maxWidth:280,border:'1px solid '+BD,borderRadius:7,padding:'8px 12px',fontSize:13,outline:'none'}}/>
          <button onClick={()=>{setForm({order_date:new Date().toISOString().slice(0,10),payment_method:'Cash',tax_rate:15,subtotal:0,tax_amount:0,total_amount:0});setModal('order');}} style={{background:N,color:'white',border:'none',borderRadius:7,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ New PO</button>
        </div>
        <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,overflow:'hidden',flex:1}}>
          {oLoad?<Spinner/>:fO.length===0?<Empty icon="📦" msg="No purchase orders yet. Click + New PO to create one."/>:(
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr><TH ch="PO Number"/><TH ch="Vendor"/><TH ch="Date"/><TH ch="Payment"/><TH ch="Total"/><TH ch="Status"/></tr></thead>
              <tbody>{fO.map(o=>(
                <tr key={o.id}><TD><span style={{fontWeight:600,color:ST,fontFamily:'monospace',fontSize:12}}>{o.po_number}</span></TD><TD>{o.vendor_name}</TD><TD>{o.order_date}</TD><TD>{payChip(o.payment_method)}</TD><TD><span style={{fontWeight:600}}>{sar(o.total_amount)}</span></TD><TD><span style={sStyle(o.status)}>{o.status}</span></TD></tr>
              ))}</tbody>
            </table>
          )}
        </div>
      </>):(<>
        <div style={{display:'flex',gap:10,flexShrink:0}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search vendors…" style={{flex:1,maxWidth:280,border:'1px solid '+BD,borderRadius:7,padding:'8px 12px',fontSize:13,outline:'none'}}/>
          <button onClick={()=>{setForm({vendor_code:'',name:'',payment_type:'Credit',credit_term_days:45});setModal('vendor');}} style={{background:N,color:'white',border:'none',borderRadius:7,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>+ Add Vendor</button>
        </div>
        <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,overflow:'hidden',flex:1}}>
          {vLoad?<Spinner/>:fV.length===0?<Empty icon="🏭" msg="No vendors added yet. Click + Add Vendor."/>:(
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr><TH ch="Code"/><TH ch="Name"/><TH ch="Phone"/><TH ch="City"/><TH ch="Payment"/><TH ch="Credit Days"/><TH ch="Status"/></tr></thead>
              <tbody>{fV.map(v=>(
                <tr key={v.id}><TD><span style={{fontFamily:'monospace',fontSize:12,color:ST,fontWeight:600}}>{v.vendor_code}</span></TD><TD><span style={{fontWeight:600}}>{v.name}</span></TD><TD>{v.phone}</TD><TD>{v.city}</TD><TD>{payChip(v.payment_type)}</TD><TD>{v.credit_term_days>0?v.credit_term_days+' days':'COD'}</TD><TD><span style={sStyle(v.status)}>{v.status}</span></TD></tr>
              ))}</tbody>
            </table>
          )}
        </div>
      </>)}
      {modal==='order'&&<Modal title="New Purchase Order" onClose={()=>setModal(null)} onSave={saveOrder} wide>
        <FG>
          <FI label="Vendor *"><Sel value={form.vendor_id} onChange={v=>setForm({...form,vendor_id:v})}><option value="">Select vendor…</option>{vendors.map(v=><option key={v.id} value={v.id}>{v.name}</option>)}</Sel></FI>
          <FI label="Order Date *" half><Inp type="date" value={form.order_date} onChange={v=>setForm({...form,order_date:v})}/></FI>
          <FI label="Expected Delivery" half><Inp type="date" value={form.expected_delivery} onChange={v=>setForm({...form,expected_delivery:v})}/></FI>
          <FI label="Payment Method"><Sel value={form.payment_method} onChange={v=>setForm({...form,payment_method:v})}><option>Cash</option><option>Bank Transfer</option></Sel></FI>
          {form.payment_method==='Bank Transfer'&&<FI label="Bank Account"><Sel value={form.bank_account_id} onChange={v=>setForm({...form,bank_account_id:v})}><option value="">Select bank…</option>{banks.map(b=><option key={b.id} value={b.id}>{b.bank_name}</option>)}</Sel></FI>}
          <FI label="Subtotal (SAR)" half><Inp type="number" value={form.subtotal} onChange={v=>setForm({...form,subtotal:v,tax_amount:(v*(form.tax_rate||15)/100).toFixed(2),total_amount:(Number(v)*(1+(form.tax_rate||15)/100)).toFixed(2)})}/></FI>

                <TD><span style={{fontSize:12,color:MD}}>{u.email}</span></TD>
                <TD><Chip c={r.color||MD} bg={r.bg_color||LG}>{r.name}</Chip></TD>
                <TD><span style={{fontSize:12,color:MD}}>{u.last_login_fmt||'Never'}</span></TD>

                <TD><div style={{display:'flex',gap:5}}>

          <div style={{fontSize:13,color:MD,marginBottom:22}}><b>{confirmDel.name}</b> will be permanently removed.</div>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>

/* ─── PERMISSIONS ────────────────────────────── */
const MODS=[{id:'purchase',name:'Purchase Management',icon:'📦',desc:'POs, vendors, GRN'},{id:'expense',name:'Expense Management',icon:'💳',desc:'Company expenses'},{id:'sales',name:'Sales Management',icon:'📊',desc:'Orders, invoices'},{id:'accounts',name:'Accounts & Finance',icon:'📒',desc:'Balance sheet, COA'},{id:'hr',name:'HR Management',icon:'👥',desc:'Employees, payroll'},{id:'delivery',name:'Delivery Management',icon:'🚛',desc:'Deliveries, fleet'},{id:'distributor',name:'Distributor Management',icon:'🏪',desc:'Distributor accounts'},{id:'production',name:'Production & Stock',icon:'🏭',desc:'Daily production'}];
const PK=['view','add','edit','delete'];
const PC={view:ST,add:GR,edit:AM,delete:RD};
const PL={view:'View',add:'Add',edit:'Edit',delete:'Delete'};

const PermissionsPage=({toast})=>{
  const [roles,rLoad]=useApi('/roles','roles');
  const [serverPerms,pLoad,reloadP]=useApi('/permissions','permissions');
  const [local,setLocal]=useState({});
  const [sel,setSel]=useState('super_admin');
  const [dirty,setDirty]=useState(false);

  useEffect(()=>{if(Object.keys(serverPerms).length>0)setLocal(serverPerms);},[serverPerms]);

  const role=roles.find(r=>r.id===sel)||{};
  const locked=role.is_locked===1||role.is_locked==='1'||role.is_locked===true;
  const rp=local[sel]||{};

  const toggle=(mod,p)=>{
    if(locked)return;
    setLocal(prev=>{
      const cur=prev[sel]?.[mod]||{view:false,add:false,edit:false,delete:false};
      let updated;
      if(p==='view'&&cur.view)updated={view:false,add:false,edit:false,delete:false};
      else if(p!=='view'&&!cur.view)updated={...cur,view:true,[p]:!cur[p]};
      else updated={...cur,[p]:!cur[p]};
      return{...prev,[sel]:{...prev[sel],[mod]:updated}};
    });
    setDirty(true);
  };

  const toggleAll=(mod,on)=>{
    if(locked)return;
    setLocal(prev=>({...prev,[sel]:{...prev[sel],[mod]:{view:on,add:on,edit:on,delete:on}}}));
    setDirty(true);
  };

  const save=async()=>{
    try{await api.put('/permissions/'+sel,local[sel]||{});setDirty(false);toast('Permissions saved');}catch(e){toast(e.message,'error');}
  };

  const cnt=MODS.filter(m=>{const p=local[sel]?.[m.id];return p?.view||p?.view===1;}).length;

  return(
    <div style={{padding:22,overflowY:'auto',height:'100%',display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <div><div style={{fontSize:18,fontWeight:700,color:DK}}>Role Permissions</div><div style={{fontSize:13,color:MD,marginTop:2}}>Set View · Add · Edit · Delete per module for each role</div></div>
        <button onClick={save} disabled={!dirty} style={{background:dirty?GR:'#E5E7EB',border:'none',borderRadius:8,padding:'9px 18px',fontSize:13,fontWeight:700,cursor:dirty?'pointer':'default',color:dirty?'white':MD}}>{dirty?'Save Changes ✓':'All Saved'}</button>
      </div>
      {(rLoad||pLoad)?<Spinner/>:(
        <div style={{display:'flex',gap:16,flex:1}}>
          <div style={{width:205,flexShrink:0}}>
            <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,overflow:'hidden'}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid '+BD,fontSize:11,fontWeight:700,color:MD,textTransform:'uppercase',letterSpacing:.5}}>Select Role</div>
              {roles.map(r=>{
                const s=sel===r.id;
                const c=MODS.filter(m=>{const p=local[r.id]?.[m.id];return p?.view||p?.view===1;}).length;
                return(
                  <button key={r.id} onClick={()=>{setSel(r.id);setDirty(false);}} style={{width:'100%',background:s?LG:'white',border:'none',borderLeft:s?'3px solid '+(r.color||N):'3px solid transparent',cursor:'pointer',padding:'10px 12px',textAlign:'left',borderBottom:'1px solid '+BD}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <Av ini={r.tag} color={r.color||N} bg={r.bg_color||'#E8EEF7'} size={26}/>
                      <div style={{flex:1}}><div style={{fontSize:12,fontWeight:s?700:500,color:DK}}>{r.name}</div><div style={{fontSize:10,color:MD}}>{c}/{MODS.length} modules</div></div>
                      {locked&&sel===r.id&&<span style={{fontSize:10}}>🔒</span>}
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',gap:12}}>
            <div style={{background:'white',border:'1px solid '+BD,borderRadius:12,overflow:'hidden'}}>
              <div style={{background:role.bg_color||'#E8EEF7',padding:'13px 18px',borderBottom:'1px solid '+BD,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <Av ini={role.tag||'??'} color={role.color||N} bg={role.bg_color||'#E8EEF7'} size={38}/>
                  <div><div style={{fontSize:15,fontWeight:700,color:role.color||N}}>{role.name}</div><div style={{fontSize:11,color:MD}}>{cnt}/{MODS.length} modules accessible</div></div>
                </div>
                {locked&&<Chip c={role.color||N} bg="rgba(255,255,255,.6)">System Locked — Full Access</Chip>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 65px 65px 65px 65px 60px',padding:'9px 18px',borderBottom:'1px solid '+BD,background:LG}}>
                <div style={{fontSize:11,fontWeight:700,color:MD,textTransform:'uppercase',letterSpacing:.5}}>Module</div>
                {PK.map(p=><div key={p} style={{textAlign:'center',fontSize:11,fontWeight:700,color:PC[p],textTransform:'uppercase',letterSpacing:.5}}>{PL[p]}</div>)}
                <div style={{textAlign:'center',fontSize:11,fontWeight:700,color:MD,textTransform:'uppercase'}}>All</div>
              </div>
              {MODS.map((m,i)=>{
                const mp=rp[m.id]||{view:false,add:false,edit:false,delete:false};
                const allOn=PK.every(p=>mp[p]||mp[p]===1||mp[p]===true);
                const hasP=pk=>mp[pk]||mp[pk]===1||mp[pk]===true;
                return(
                  <div key={m.id} style={{display:'grid',gridTemplateColumns:'1fr 65px 65px 65px 65px 60px',padding:'11px 18px',borderBottom:i<MODS.length-1?'1px solid '+BD:'none',background:i%2===0?'white':LG+'60',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:18}}>{m.icon}</span><div><div style={{fontSize:13,fontWeight:600,color:DK}}>{m.name}</div><div style={{fontSize:11,color:MD}}>{m.desc}</div></div></div>
                    {PK.map(p=>(
                      <div key={p} style={{display:'flex',justifyContent:'center'}}>
                        {locked?(
                          <div style={{width:24,height:24,borderRadius:5,background:PC[p],display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:'white'}}>✓</div>
                        ):(
                          <button onClick={()=>toggle(m.id,p)} style={{width:26,height:26,borderRadius:6,border:'none',cursor:'pointer',background:hasP(p)?PC[p]:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:hasP(p)?'white':'#94A3B8',transition:'all .15s'}}>
                            {hasP(p)?'✓':''}
                          </button>
                        )}
                      </div>
                    ))}
                    <div style={{display:'flex',justifyContent:'center'}}>
                      {!locked?<button onClick={()=>toggleAll(m.id,!allOn)} style={{background:allOn?N:'transparent',border:'1.5px solid '+(allOn?N:BD),borderRadius:6,padding:'2px 9px',fontSize:11,cursor:'pointer',color:allOn?'white':MD,fontWeight:600}}>{allOn?'All ✓':'All'}</button>:<span style={{fontSize:11,color:MD}}>✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const NAV=[
  {sec:'Main',items:[{id:'dashboard',label:'Dashboard',icon:'📊'}]},
  {sec:'Modules',items:[{id:'purchase',label:'Purchase',icon:'📦'},{id:'expense',label:'Expenses',icon:'💳'},{id:'sales',label:'Sales',icon:'📊'},{id:'accounts',label:'Accounts',icon:'📒'},{id:'hr',label:'HR',icon:'👥'},{id:'delivery',label:'Delivery',icon:'🚛'},{id:'distributor',label:'Distributor',icon:'🏪'},{id:'production',label:'Production & Stock',icon:'🏭'}]},

/* ─── APP ────────────────────────────────────── */
function App(){
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [collapsed,setCollapsed]=useState(false);
  const [toast,setToast]=useState(null);
  const [dropOpen,setDropOpen]=useState(false);

  useEffect(()=>{
    api.get('/auth/me')
      .then(d=>{if(d.user)setUser(d.user);})
      .catch(()=>{})
      .finally(()=>setChecking(false));
  },[]);

  const showToast=(msg,type='success')=>setToast({msg,type});
  const logout=async()=>{try{await api.post('/auth/logout');}catch(e){}setUser(null);setPage('dashboard');setDropOpen(false);};

  if(checking)return(
    <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:14}}>
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="21" stroke={AM} strokeWidth="3"/><circle cx="24" cy="24" r="13" stroke={N} strokeWidth="3"/><circle cx="24" cy="24" r="5" fill={AM}/></svg>
      <div style={{fontSize:14,color:MD}}>Loading Aknan ERP…</div>
    </div>
  );

  if(!user)return <Login onLogin={u=>setUser(u)}/>;

  const label=[...NAV.flatMap(s=>s.items)].find(i=>i.id===page)?.label||'Dashboard';
  const ini=(user.name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const props={toast:showToast,setPage};

  const Content=()=>{
    switch(page){
      case'dashboard':   return <Dashboard setPage={setPage} user={user}/>;
      case'purchase':    return <PurchasePage {...props}/>;
      case'expense':     return <ExpensePage {...props}/>;
      case'sales':       return <SalesPage {...props}/>;
      case'accounts':    return <AccountsPage {...props}/>;
      case'hr':          return <HRPage {...props}/>;
      case'delivery':    return <DeliveryPage {...props}/>;
      case'distributor': return <DistributorPage {...props}/>;
      case'production':  return <ProductionPage {...props}/>;
      case'users':       return <UsersPage {...props}/>;
      case'permissions': return <PermissionsPage {...props}/>;
      default:           return null;
    }
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <div style={{width:collapsed?66:228,background:N,height:'100vh',display:'flex',flexDirection:'column',transition:'width .25s',overflow:'hidden',flexShrink:0}}>
        <div style={{padding:collapsed?'14px 0':'18px 14px',borderBottom:'1px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',gap:10,justifyContent:collapsed?'center':'flex-start'}}>
          <svg width="30" height="30" viewBox="0 0 48 48" fill="none" style={{flexShrink:0}}><circle cx="24" cy="24" r="21" stroke={AM} strokeWidth="3"/><circle cx="24" cy="24" r="13" stroke="white" strokeWidth="2.5"/><circle cx="24" cy="24" r="5" fill={AM}/></svg>
          {!collapsed&&<div><div style={{color:'white',fontWeight:700,fontSize:14}}>AKNAN ERP</div><div style={{color:'rgba(255,255,255,.4)',fontSize:9,letterSpacing:1.2,textTransform:'uppercase'}}>app.aknans.sa</div></div>}
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'6px 0'}}>
          {NAV.map(sec=>(
            <div key={sec.sec} style={{marginBottom:3}}>
              {!collapsed&&<div style={{color:'rgba(255,255,255,.3)',fontSize:9.5,fontWeight:700,letterSpacing:1.4,textTransform:'uppercase',padding:'10px 14px 3px'}}>{sec.sec}</div>}
              {sec.items.map(item=>{
                const a=page===item.id;
                return(
                  <button key={item.id} onClick={()=>setPage(item.id)} title={collapsed?item.label:''} style={{width:'100%',background:a?'rgba(255,255,255,.12)':'transparent',border:'none',cursor:'pointer',padding:collapsed?'9px 0':'9px 14px',display:'flex',alignItems:'center',gap:9,color:a?'white':'rgba(255,255,255,.6)',fontSize:12.5,fontWeight:a?600:400,textAlign:'left',borderLeft:a?'3px solid '+AM:'3px solid transparent',justifyContent:collapsed?'center':'flex-start'}}>
                    <span style={{fontSize:15,flexShrink:0}}>{item.icon}</span>
                    {!collapsed&&<span style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.label}</span>}
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      </div>
      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{height:52,background:'white',borderBottom:'1px solid '+BD,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 22px',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <button onClick={()=>setCollapsed(!collapsed)} style={{background:'none',border:'none',cursor:'pointer',fontSize:17,color:MD,padding:4}}>☰</button>
            <div style={{fontSize:14,fontWeight:600,color:DK}}>{label}</div>
          </div>
          <div style={{position:'relative'}}>
            <button onClick={()=>setDropOpen(!dropOpen)} style={{background:dropOpen?LG:'none',border:'1px solid '+(dropOpen?BD:'transparent'),borderRadius:8,padding:'6px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:8}}>
              <Av ini={ini} color={user.color||N} bg={user.bg||'#E8EEF7'} size={28}/>
              <div style={{textAlign:'left'}}><div style={{fontSize:13,fontWeight:600,color:DK}}>{user.name}</div><div style={{fontSize:11,color:MD}}>{user.role_name||'User'}</div></div>
              <span style={{color:MD,fontSize:12}}>▾</span>
            </button>
            {dropOpen&&(
              <div style={{position:'absolute',top:'calc(100% + 4px)',right:0,background:'white',border:'1px solid '+BD,borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.12)',minWidth:190,overflow:'hidden',zIndex:100}}>
                <div style={{padding:'10px 14px',borderBottom:'1px solid '+BD}}>
                  <div style={{fontSize:12,color:MD}}>Signed in as</div>
                  <div style={{fontSize:13,fontWeight:600,color:DK}}>{user.email}</div>
                </div>
                <button onClick={()=>{setDropOpen(false);logout();}} style={{width:'100%',background:'none',border:'none',padding:'10px 14px',textAlign:'left',cursor:'pointer',fontSize:13,color:RD,display:'flex',alignItems:'center',gap:8}}>⏻ Sign out</button>
              </div>
            )}
          </div>
        </div>
        <div style={{flex:1,overflow:'hidden'}}><Content/></div>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
